<!DOCTYPE html>
<head>
	<title>Stellenbosch STEM Tutors | Get a tutor!</title>
	<meta name="description" content="Simply fill in your details, and we will get back to you ASAP!">
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
	<script type="application/ld+json">
	{
	 "@context": "https://schema.org",
	 "@type": "Service",
	 "name": "Find a Tutor",
	 "description": "Students fill out a form to be matched with a suitable STEM tutor at Stellenbosch STEM Tutors.",
	 "provider": {
	   "@type": "Organization",
	   "name": "Stellenbosch STEM Tutors"
	 },
	 "serviceType": "University STEM tutoring",
	 "areaServed": {
	   "@type": "Place",
	   "name": "Stellenbosch, South Africa"
	 },
	 "potentialAction": {
	   "@type": "ReserveAction",
	   "target": "https://stellenboschstemtutors.github.io/website/form.html"
	 }
	}
	</script>
</head>

<body>
	<header>
		<div id="left-box"></div>
		<div id="title-box">
			<a class="heading-text-anchor" href="index.html">Stellenbosch STEM Tutors</a>
		</div>
		<div id="link-box">
			<a class="heading-text-anchor"href="index.html"></a>
		</div>
	</header>
	<main class="flex-center-elements">
		<div class="form-intro-div">
			<p>No setting up accounts - no wasting time.</p>
			<p>Simply fill in your details and we will get back to you ASAP!</p>
		</div>
		<div class="form-fill-div">
			<form action="https://formspree.io/f/xreykdql" method="POST">
				<input type="text" placeholder="Name" name="name" required>
				<input type="email" placeholder="Email address" name="email" required>
		    		<input type="text" placeholder="Module (e.g. AM124)" name="module">
		    		<fieldset>
			    		<legend>I prefer:</legend>
					<input class="checkbox" type="radio" name="teaching-method" value="in-person" required>
					<label>In-person</label>
					<input class="checkbox" type="radio" name="teaching-method" value="online">
					<label>Online</label>
				</fieldset>
		    		<button class="submit" type="submit">Find tutor...</button>
			</form>
		</div>
	</main>
	<footer>
		<div class="footer-info-div">
			<div>
				<p>... your path to success</p>
			</div>
			<div>
				<p>stellenboschstemtutors@outlook.com<br>&copy; STEM Tutors 2026</p>
			</div>
		</div>
	</footer>


</body>
